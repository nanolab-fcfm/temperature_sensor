name: Deploy documentation

# Builds the MkDocs site and publishes it to GitHub Pages under nanolab.cl/<repo>/.
#
# One-time setup: Settings → Pages → Source: GitHub Actions.
# Uses `uv run --with ...` so NO pyproject/dependency files are required — this
# works in any repo (Python, C++, TypeScript, …). Nothing is installed
# system-wide.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build site
        run: >-
          uv run --with mkdocs-material --with pymdown-extensions
          mkdocs build --strict

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
